services:
  # 🌐 YesYouCan MIS Backend
  - type: web
    name: yyc-backend
    env: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false # Requires manual entry in Render Dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: yyc-cache
          property: connectionString

  # 🤖 YesYouCan AI Engine
  - type: web
    name: yyc-ai
    env: python
    rootDir: ai-service
    plan: free
    buildCommand: pip install -r requirements.txt
    # Render will automatically inject $PORT, so we listen on that
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

  # 🧠 YesYouCan Redis Cache
  - type: keyvalue
    name: yyc-cache
    plan: free
    ipAllowList: []
