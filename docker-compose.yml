version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yyc_backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=development
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - yyc_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: yyc_frontend
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env.local
    environment:
      - NODE_ENV=development
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - yyc_net

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: yyc_ai
    ports:
      - "8000:8000"
    env_file:
      - ./ai-service/.env
    volumes:
      - ./ai-service:/app
    restart: unless-stopped
    networks:
      - yyc_net

  redis:
    image: redis:7-alpine
    container_name: yyc_redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 50mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    networks:
      - yyc_net

networks:
  yyc_net:
    driver: bridge
